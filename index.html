<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="theme-color" content="#0d1117"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="GymTracker"/>
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png"/>
<link rel="apple-touch-icon" sizes="152x152" href="apple-touch-icon.png"/>
<link rel="apple-touch-icon" sizes="120x120" href="apple-touch-icon.png"/>
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"/>
<link rel="manifest" href="manifest.json"/>
<title>GymTracker v235305</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d1117;--bg2:#161b22;--card:#1c2128;--border:#30363d;
  --blue:#4d94ff;--blue2:#58a6ff;--bluedim:rgba(77,148,255,0.12);
  --orange:#ff7b00;--green:#3fb950;--red:#f85149;--purple:#a371f7;
  --teal:#2dd4bf;--pink:#f472b6;
  --txt:#e6edf3;--txt2:#8b949e;--muted:#484f58;
  --r:12px;--rl:20px;--rs:8px;
  --fd:'Bebas Neue',sans-serif;--fb:'Space Grotesk',sans-serif;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)
}
* { transition: background-color 0.3s, border-color 0.3s, color 0.2s; }
.ico, button, input { transition: none !important; }
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:var(--fb);-webkit-font-smoothing:antialiased}
#app{position:fixed;inset:0;display:flex;flex-direction:column}
#screen{flex:1;overflow:hidden;position:relative;min-height:0}
#nav{background:rgba(13,17,23,0.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding-bottom:var(--sb);flex-shrink:0}
.ntab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 2px;border:none;background:none;cursor:pointer;color:var(--muted);font-family:var(--fb);font-size:9px;font-weight:600;letter-spacing:0.02em;transition:color 0.2s}
.ntab.on{color:var(--blue2)}
.ntab .ico{font-size:20px}
.pg{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity 0.15s}
.pg.show{opacity:1;pointer-events:all}
.scr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.scr::-webkit-scrollbar{display:none}
.hdr{padding:calc(18px + var(--st)) 20px 14px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.hdr h1{font-family:var(--fd);font-size:26px;letter-spacing:0.03em}
.hdr p{font-size:13px;color:var(--txt2);margin-top:2px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:16px}
button{cursor:pointer;font-family:var(--fb)}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:var(--r);font-weight:600;font-size:15px;padding:13px 20px;min-height:50px;width:100%;transition:transform 0.1s,opacity 0.1s}
.btn:active{transform:scale(0.97)}
.btn-blue{background:linear-gradient(135deg,#4d94ff,#2d6fd4);color:#fff;box-shadow:0 4px 16px rgba(77,148,255,0.3)}
.btn-green{background:linear-gradient(135deg,#2ea043,#3fb950);color:#fff;box-shadow:0 4px 16px rgba(63,185,80,0.3)}
.btn-ghost{background:var(--card);color:var(--txt2);border:1px solid var(--border)}
.btn-danger{background:rgba(248,81,73,0.12);color:var(--red);border:1px solid rgba(248,81,73,0.3)}
.btn-orange{background:linear-gradient(135deg,#c2560a,#ff7b00);color:#fff;box-shadow:0 4px 16px rgba(255,123,0,0.3)}
.btn-sm{min-height:38px;font-size:13px;padding:7px 12px}
input,textarea,select{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);color:var(--txt);font-family:var(--fb);font-size:15px;padding:10px 12px;width:100%;outline:none;transition:border-color 0.2s}
input:focus,textarea:focus,select:focus{border-color:var(--blue)}
.ngrp{display:flex;align-items:center;gap:8px}
.ngrp input{text-align:center;font-weight:700;font-size:18px;flex:1}
.sbtn{width:40px;height:40px;min-height:unset;border-radius:50%;border:1px solid var(--border);background:var(--bg2);color:var(--txt);font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;transition:background 0.15s}
.sbtn:active{background:var(--bluedim);border-color:var(--blue)}
.prog{height:4px;background:var(--border);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:99px;transition:width 0.4s}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;background:var(--bluedim);color:var(--blue2);margin:2px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:999;display:flex;align-items:flex-end}
.sheet{width:100%;background:var(--bg2);border-radius:var(--rl) var(--rl) 0 0;padding:20px 20px calc(20px + var(--sb));max-height:90vh;overflow-y:auto}
.handle{width:36px;height:4px;background:var(--border);border-radius:99px;margin:0 auto 20px}
#toasts{position:fixed;bottom:calc(80px + var(--sb));left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:380px;z-index:9999;pointer-events:none;display:flex;flex-direction:column;gap:8px}
.toast{border-radius:var(--r);padding:12px 16px;font-size:14px;font-weight:600;text-align:center;animation:slideUp 0.3s ease}
.t-ok{background:rgba(63,185,80,0.15);border:1px solid rgba(63,185,80,0.4);color:var(--green)}
.t-info{background:rgba(77,148,255,0.15);border:1px solid rgba(77,148,255,0.4);color:var(--blue2)}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px 20px;color:var(--muted);text-align:center;font-size:14px}
.lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;display:block;margin-bottom:6px;font-weight:600}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.pulse{animation:pulse 1.5s infinite}

/* Edit-mode workout card on home */
.wo-card{display:flex;align-items:center;gap:14px;padding:16px;border-radius:20px;border:1px solid;width:100%;margin-bottom:10px;font-family:var(–fb);text-align:left;position:relative;overflow:hidden}
.wo-card-actions{display:flex;gap:6px;margin-top:10px}
.wo-edit-badge{position:absolute;top:10px;right:10px;background:rgba(77,148,255,0.15);border:1px solid rgba(77,148,255,0.3);border-radius:6px;padding:3px 8px;font-size:10px;font-weight:700;color:var(–blue2);letter-spacing:0.05em}

/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:10px}
.cal-day{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;background:var(–bg);color:var(–muted)}
.cal-day.has-gym{background:rgba(77,148,255,0.2);color:var(–blue2);border:1px solid rgba(77,148,255,0.3)}
.cal-day.has-tennis{background:rgba(63,185,80,0.2);color:var(–green);border:1px solid rgba(63,185,80,0.3)}
.cal-day.has-activity{background:rgba(163,113,247,0.2);color:var(–purple);border:1px solid rgba(163,113,247,0.3)}
.cal-day.has-multi{background:linear-gradient(135deg,rgba(77,148,255,0.2),rgba(163,113,247,0.2));color:var(–blue2);border:1px solid rgba(77,148,255,0.3)}
.cal-day.today{box-shadow:0 0 0 2px var(–orange)}
.cal-day.empty{background:transparent}

/* Water */
.water-drops{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:10px 0}
.drop{width:44px;height:44px;border-radius:50%;border:2px solid var(–border);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;transition:all 0.2s;background:var(–bg)}
.drop.filled{background:rgba(45,212,191,0.2);border-color:var(–teal)}
.drop:active{transform:scale(0.9)}

/* Feeling */
.feeling-btn{flex:1;padding:10px;border-radius:var(–r);border:2px solid var(–border);background:var(–bg);display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:all 0.2s;font-family:var(–fb);font-size:12px;font-weight:600;color:var(–txt2)}
.feeling-btn.selected{border-color:var(–blue);background:var(–bluedim);color:var(–blue2)}
.feeling-btn .feel-ico{font-size:24px}

/* Food meal card */
.meal-card{background:var(–card);border:1px solid var(–border);border-radius:var(–rl);margin-bottom:10px;overflow:hidden}
.meal-hdr{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.meal-body{padding:0 16px 14px;display:none}
.meal-body.open{display:block}

/* Inline exercise editor inside workout screen */
.ex-inline-editor{background:var(–bg2);border:1px solid var(–blue);border-radius:var(–r);padding:14px;margin-top:8px;display:flex;flex-direction:column;gap:10px}

/* Drag handle style */
.drag-handle{color:var(–muted);font-size:18px;padding:4px 8px;cursor:grab;flex-shrink:0;user-select:none}
</style>

</head>
<body>
<div id="app">
  <div id="screen">
    <div class="pg show" id="pg-home"><div class="scr" id="home-body" style="padding-bottom:calc(80px + var(--sb))"></div></div>
    <div class="pg" id="pg-history">
      <div class="hdr"><h1>Histórico</h1><p id="hist-sub">—</p></div>
      <div class="scr" style="padding:16px;padding-bottom:calc(80px + var(--sb))" id="hist-body"></div>
    </div>
    <div class="pg" id="pg-stats">
      <div class="hdr"><h1>Stats</h1><p>Evolução e calendário</p></div>
      <div class="scr" style="padding:16px;padding-bottom:calc(80px + var(--sb))" id="stats-body"></div>
    </div>
    <div class="pg" id="pg-water">
      <div class="hdr"><h1>💧 Água</h1><p id="water-sub">Meta diária</p></div>
      <div class="scr" style="padding:16px;padding-bottom:calc(80px + var(--sb))" id="water-body"></div>
    </div>
    <div class="pg" id="pg-food">
      <div class="hdr"><h1>🥗 Alimentação</h1><p>Registro e sugestões</p></div>
      <div class="scr" style="padding:16px;padding-bottom:calc(80px + var(--sb))" id="food-body"></div>
    </div>
    <div class="pg" id="pg-suggest">
      <div class="hdr"><h1>💡 Sugestões</h1><p>Monte seu treino ideal</p></div>
      <div class="scr" style="padding:16px;padding-bottom:calc(80px + var(--sb))" id="suggest-body"></div>
    </div>
    <div class="pg" id="pg-profile">
      <div class="hdr"><h1>👤 Perfil</h1><p id="profile-sub">Seu perfil</p></div>
      <div class="scr" style="padding:16px;padding-bottom:calc(80px + var(--sb))" id="profile-body"></div>
    </div>
    <div class="pg" id="pg-workouts">
      <div class="hdr"><h1 id="wk-title">Treinos</h1><p id="wk-sub">Gerencie seus treinos</p></div>
      <div class="scr" style="padding:16px;padding-bottom:calc(80px + var(--sb))" id="wk-body"></div>
    </div>
    <div class="pg" id="pg-workout">
      <div id="wo-hdr" style="flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);padding:calc(14px + var(--st)) 16px 12px"></div>
      <div id="music-player" style="background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0"></div>
      <div class="scr" style="padding:14px 16px 20px" id="wo-body"></div>
    </div>
    <div class="pg" id="pg-tennis">
      <div class="hdr">
        <button onclick="showPage('home')" style="background:none;border:none;color:var(--txt2);font-size:14px;margin-bottom:8px;padding:0;cursor:pointer;font-family:var(--fb)">← Voltar</button>
        <h1>🎾 Registrar Tênis</h1>
      </div>
      <div class="scr" style="padding:20px;padding-bottom:calc(20px + var(--sb))" id="tennis-body"></div>
    </div>
    <div class="pg" id="pg-activity">
      <div class="hdr">
        <button onclick="showPage('home')" style="background:none;border:none;color:var(--txt2);font-size:14px;margin-bottom:8px;padding:0;cursor:pointer;font-family:var(--fb)">← Voltar</button>
        <h1>🏃 Registrar Atividade</h1>
      </div>
      <div class="scr" style="padding:20px;padding-bottom:calc(20px + var(--sb))" id="activity-body"></div>
    </div>
    <div class="pg" id="pg-detail">
      <div id="detail-hdr" style="flex-shrink:0;padding:calc(16px + var(--st)) 20px 16px;background:var(--bg2);border-bottom:1px solid var(--border)"></div>
      <div class="scr" style="padding:16px;padding-bottom:calc(20px + var(--sb))" id="detail-body"></div>
    </div>
  </div>
  <nav id="nav">
    <button class="ntab on" id="ntab-home"     onclick="showPage('home')"    ><span class="ico">🏠</span><span>Início</span></button>
    <button class="ntab"    id="ntab-suggest"  onclick="showPage('suggest')" ><span class="ico">💡</span><span>Sugestões</span></button>
    <button class="ntab"    id="ntab-stats"    onclick="showPage('stats')"   ><span class="ico">📈</span><span>Evolução</span></button>
    <button class="ntab"    id="ntab-water"    onclick="showPage('water')"   ><span class="ico">💧</span><span>Água</span></button>
    <button class="ntab"    id="ntab-food"     onclick="showPage('food')"    ><span class="ico">🥗</span><span>Comida</span></button>
    <button class="ntab"    id="ntab-profile"  onclick="showPage('profile')" ><span class="ico">👤</span><span>Perfil</span></button>
  </nav>
</div>
<div class="overlay" id="modal" style="display:none" onclick="closeModal()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="handle"></div>
    <div id="modal-body"></div>
  </div>
</div>
<div id="toasts"></div>

<script>


// -- EXERCISE IMAGE MAP -------------------------------------------------
var EXERCISE_IMGS = {};

// -- DATA ---------------------------------------------------------------
var KEYS = {W:'gt_w2',H:'gt_h2',WH:'gt_wh2',INIT:'gt_init3',WATER:'gt_water',WATERMETA:'gt_watermeta',FOOD:'gt_food'};

var DEFAULTS = [
  {id:'wa',name:'Treino A',exercises:[
    {id:'e1',name:'Lat Pulldown',sets:3,reps:10,weight:0},
    {id:'e2',name:'Leg Extension',sets:3,reps:10,weight:0},
    {id:'e3',name:'Hip Adductor',sets:3,reps:10,weight:0},
    {id:'e4',name:'Tríceps na Corda',sets:3,reps:10,weight:0},
    {id:'e5',name:'Bíceps Curl',sets:3,reps:10,weight:0},
    {id:'e6',name:'Abdominal',sets:3,reps:15,weight:0},
  ]},
  {id:'wb',name:'Treino B',exercises:[
    {id:'e7',name:'Leg Press',sets:3,reps:10,weight:0},
    {id:'e8',name:'Seated Leg Curl',sets:3,reps:10,weight:0},
    {id:'e9',name:'Hip Abductor',sets:3,reps:10,weight:0},
    {id:'e10',name:'Chest Press',sets:3,reps:10,weight:0},
    {id:'e11',name:'Abdominal',sets:3,reps:15,weight:0},
  ]},
];

function ls(k){try{return JSON.parse(localStorage.getItem(k)||'null')}catch{return null}}
function lss(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

function initData(){
  if(!localStorage.getItem(KEYS.INIT)){
    lss(KEYS.W,DEFAULTS);lss(KEYS.H,[]);lss(KEYS.WH,{});
    lss(KEYS.WATER,{});lss(KEYS.WATERMETA,2500);lss(KEYS.FOOD,{});
    localStorage.setItem(KEYS.INIT,'1');
  }
}
var getWorkouts=()=>ls(KEYS.W)||[];
var saveWorkouts=v=>lss(KEYS.W,v);
var getHistory=()=>ls(KEYS.H)||[];
var getWeights=()=>ls(KEYS.WH)||{};

function saveSession(s){
  var h=getHistory();h.unshift(s);lss(KEYS.H,h);
  var wh=getWeights();
  (s.exercises||[]).forEach(ex=>{
    if(!wh[ex.name])wh[ex.name]=[];
    wh[ex.name].push({date:s.date,weight:ex.weight,reps:ex.reps});
  });
  lss(KEYS.WH,wh);
}
function delSession(id){lss(KEYS.H,getHistory().filter(s=>s.id!==id));}
function weekStats(){
  var h=getHistory(),now=new Date();
  var ws=new Date(now);ws.setDate(now.getDate()-now.getDay());ws.setHours(0,0,0,0);
  var sess=h.filter(s=>new Date(s.date)>=ws);
  return{n:sess.length,mins:sess.reduce((a,s)=>a+(s.duration||0),0)};
}
function lastWeightsMap(){
  var lw={};
  getHistory().forEach(s=>(s.exercises||[]).forEach(ex=>{if(!(ex.name in lw))lw[ex.name]=ex.weight;}));
  return lw;
}
function getTodayKey(){return new Date().toISOString().split('T')[0];}
function getWaterToday(){var w=ls(KEYS.WATER)||{};return w[getTodayKey()]||0;}
function addWater(ml){var w=ls(KEYS.WATER)||{};var k=getTodayKey();w[k]=(w[k]||0)+ml;lss(KEYS.WATER,w);}
function setWaterMeta(ml){lss(KEYS.WATERMETA,ml);}
function getWaterMeta(){return ls(KEYS.WATERMETA)||2500;}
function getFoodToday(){var f=ls(KEYS.FOOD)||{};return f[getTodayKey()]||{breakfast:[],lunch:[],snack:[],dinner:[]};}
function saveFoodToday(data){var f=ls(KEYS.FOOD)||{};f[getTodayKey()]=data;lss(KEYS.FOOD,f);}

// -- UTILS --------------------------------------------------------------
function uid(){return Math.random().toString(36).slice(2,9)+Date.now().toString(36);}
function vib(p){if(navigator.vibrate)navigator.vibrate(p||[80]);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDur(s){var h=~~(s/3600),m=~~(s%3600/60),ss=s%60;return h?h+'h '+m+'m':m?m+'m '+ss+'s':ss+'s';}
function fmtMin(m){return m<60?m+'min':~~(m/60)+'h'+(m%60?' '+m%60+'min':'');}
function fmtDate(d){
  var date=new Date(d),now=new Date(),days=~~((now-date)/86400000);
  if(days===0)return'Hoje';if(days===1)return'Ontem';if(days<7)return days+' dias atrás';
  return date.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
}
function toast(msg,ok){
  var el=document.createElement('div');
  el.className='toast '+(ok===false?'t-info':'t-ok');
  el.textContent=msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(),3000);
}
function openModal(html){document.getElementById('modal-body').innerHTML=html;document.getElementById('modal').style.display='flex';}
function closeModal(){document.getElementById('modal').style.display='none';}

// -- NAVIGATION ---------------------------------------------------------
var NAV_PAGES=['home','history','stats','workouts','water','food','suggest','profile'];
function showPage(name,data){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('show'));
  document.querySelectorAll('.ntab').forEach(b=>b.classList.remove('on'));
  document.getElementById('nav').style.display='flex';
  var pg=document.getElementById('pg-'+name);
  if(!pg)return;
  pg.classList.add('show');
  if(NAV_PAGES.includes(name)){
    var t=document.getElementById('ntab-'+name);
    if(t)t.classList.add('on');
  } else {
    document.getElementById('nav').style.display='none';
  }
  if(name==='home')renderHome();
  else if(name==='history')renderHistory();
  else if(name==='stats')renderStats();
  else if(name==='workouts')renderWorkouts();
  else if(name==='workout')startWorkout(data);
  else if(name==='tennis')renderTennis();
  else if(name==='activity')renderActivity();
  else if(name==='detail')renderDetail(data);
  else if(name==='water')renderWater();
  else if(name==='food')renderFood();
  else if(name==='suggest')renderSuggest();
  else if(name==='profile')renderProfile();
}

// ----------------------------------------------------------------------
// HOME — com gerenciamento inline de treinos
// ----------------------------------------------------------------------

// State: are we in edit mode on home?
var homeEditMode = false;

function renderHome(){
  var workouts = getWorkouts();
  var wk = weekStats();
  var hist = getHistory().slice(0,3);
  var colors = [
    {bg:'rgba(77,148,255,0.1)',bd:'rgba(77,148,255,0.3)',ic:'rgba(77,148,255,0.15)',tx:'#58a6ff'},
    {bg:'rgba(255,123,0,0.1)',  bd:'rgba(255,123,0,0.3)', ic:'rgba(255,123,0,0.15)', tx:'#ff9a3c'},
    {bg:'rgba(163,113,247,0.1)',bd:'rgba(163,113,247,0.3)',ic:'rgba(163,113,247,0.15)',tx:'#c4b5fd'},
    {bg:'rgba(63,185,80,0.1)', bd:'rgba(63,185,80,0.3)', ic:'rgba(63,185,80,0.15)', tx:'#4ade80'},
  ];

  // Live banner
  var liveBanner = WO

// Home workout management helpers
function homeRenameWorkout(id, val) {
  saveWorkouts(getWorkouts().map(function(w){return w.id===id ? Object.assign({},w,{name:val}) : w;}));
}
function homeAddWorkout() {
  var name = 'Treino ' + String.fromCharCode(65 + getWorkouts().length);
  var nw = {id:uid(), name, exercises:[]};
  saveWorkouts(getWorkouts().concat([nw]));
  renderHome();
  // Auto open exercise editor after short delay
  setTimeout(() => homeEditExercises(nw.id), 100);
}
function homeDupWorkout(id) {
  var w = getWorkouts().find(x=>x.id===id);
  if(!w) return;
  saveWorkouts(getWorkouts().concat([Object.assign({},w,{id:uid(),name:w.name+' (cópia)',exercises:(w.exercises||[]).map(function(e){return Object.assign({},e,{id:uid()});})})]));
  renderHome();
}
function homeDelWorkout(id) {
  openModal(
    '<h3 style="font-family:var(--fd);font-size:24px;margin-bottom:10px">Excluir treino?</h3>'
    +'<p style="color:var(--txt2);font-size:14px;margin-bottom:20px">Essa ação não pode ser desfeita.</p>'
    +'<div style="display:flex;flex-direction:column;gap:10px">'
    +'<button class="btn btn-danger" onclick="saveWorkouts(getWorkouts().filter(w=>w.id!==\''+id+'\'));closeModal();renderHome()">🗑 Excluir</button>'
    +'<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>'
    +'</div>'
  );
}
function homeEditExercises(wId) {
  // Open a modal with the exercise list editor
  renderExerciseEditorModal(wId);
}

function modalRenameWorkout(wId, val) {

function modalUpdEx(wId, exId, field, val) {

function modalRmEx(wId, exId) {

// WORKOUT STATE
// ----------------------------------------------------------------------
var WO = null;

function woBegin(){
  if(!WO||WO.started)return;
  WO.started=true;
  WO.start=Date.now();
  WO.timer=setInterval(()=>{
    WO.elapsed=Math.floor((Date.now()-WO.start)/1000);
    var el=document.getElementById('wo-clock');if(el)el.textContent=fmtDur(WO.elapsed);
    var bc=document.getElementById('banner-clock');if(bc)bc.textContent=fmtDur(WO.elapsed);
    woUpdateProgress();
  },1000);
  renderWoHeader();
}

function startWorkout(id){
  if(WO&&WO.workout.id===id){renderWoHeader();renderWoBody();return;}
  if(WO){clearInterval(WO.timer);clearInterval(WO.restTimer);}
  var w=getWorkouts().find(x=>x.id===id);
  if(!w){showPage('home');return;}
  var lw=lastWeightsMap();
  WO={
    workout:w,start:null,started:false,elapsed:0,
    timer:null,restTimer:null,restRemaining:0,restTotal:60,
    sets:{},data:{},feeling:null,
    editingExId:null,  // which exercise is in inline-edit mode
  };
  w.exercises.forEach(ex=>{
    WO.sets[ex.id]=0;
    WO.data[ex.id]={weight:lw[ex.name]||ex.weight||0,reps:ex.reps};
  });
  renderWoHeader();
  renderWoBody();
  renderMusicPlayer();
}

function stopWorkout(){
  if(WO){if(WO.timer)clearInterval(WO.timer);if(WO.restTimer)clearInterval(WO.restTimer);}
  WO=null;
}

function woTotalSets(){return WO?WO.workout.exercises.reduce((a,e)=>a+e.sets,0):0;}
function woDoneSets(){return WO?Object.values(WO.sets).reduce((a,v)=>a+v,0):0;}
function woUpdateProgress(){
  var tot=woTotalSets(),done=woDoneSets();
  var p=document.getElementById('wo-prog');if(p)p.style.width=(tot?done/tot*100:0)+'%';
  var l=document.getElementById('wo-prog-lbl');if(l)l.textContent=done+'/'+tot+' séries';
}

    +'<div class="prog" style="flex:1"><div class="prog-fill" id="wo-prog" style="width:0%"></div></div>'
    +'<span style="font-size:12px;color:var(--muted)" id="wo-prog-lbl">0/'+woTotalSets()+' séries</span>'
    +'</div>';
  woUpdateProgress();
}

// Edit workout from inside workout screen
function woEditWorkout() {
  if (!WO) return;
  var wId = WO.workout.id;
  renderExerciseEditorModal(wId);
  // After modal closes, refresh the workout with updated exercises
}

function renderWoBody(){
  if(!WO)return;
  // Reload fresh workout data (in case exercises were edited)
  var freshW = getWorkouts().find(x=>x.id===WO.workout.id);
  if (freshW) {
    WO.workout = freshW;
    // Init any new exercises
    freshW.exercises.forEach(ex=>{
      if (!(ex.id in WO.sets)) WO.sets[ex.id]=0;
      if (!(ex.id in WO.data)) WO.data[ex.id]={weight:0,reps:ex.reps};
    });
  }

  document.getElementById('wo-body').innerHTML =
    // "Edit exercises" quick bar at top of body
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--r)">'
    +'<span style="font-size:13px;color:var(--txt2)">'+WO.workout.exercises.length+' exercícios</span>'
    +'<button onclick="woEditWorkout()" style="background:var(--bluedim);border:1px solid rgba(77,148,255,0.3);border-radius:var(--rs);padding:6px 14px;color:var(--blue2);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--fb)">✏️ Editar Treino</button>'
    +'</div>'
    + WO.workout.exercises.map(ex=>renderExCard(ex)).join('')
    +'<div id="wo-rest-area"></div><div id="wo-finish-area" style="margin-top:8px"></div>';

// -- EXERCISE THUMBNAIL -------------------------------------------------
function exThumb(name, done) {
  var url = EXERCISE_IMGS[name];
  if (!url) {
    var keys = Object.keys(EXERCISE_IMGS);
    var norm = s => s.toLowerCase().replace(/[^a-z0-9]/g,'');
    var nameLow = norm(name);
    for (var i=0; i<keys.length; i++){
      if(norm(keys[i])===nameLow){ url=EXERCISE_IMGS[keys[i]]; break; }
    }
  }
  var html = '<div style="width:58px;height:58px;border-radius:12px;overflow:hidden;flex-shrink:0;background:var(--bg2);position:relative">';
  if (url) {
    html += '<img src="'+url+'" style="width:100%;height:100%;object-fit:cover;display:block" loading="lazy"/>';
  } else {
    html += '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:26px">'+(done?'✅':'💪')+'</div>';
  }
  if (done) {
    html += '<div style="position:absolute;inset:0;background:rgba(63,185,80,0.7);display:flex;align-items:center;justify-content:center;font-size:22px">✅</div>';
  }
  html += '</div>';
  return html;
}

function renderExCard(ex){
  if(!WO)return'';
  var done=WO.sets[ex.id]>=ex.sets;
  var d=WO.data[ex.id]||{weight:0,reps:ex.reps};
  var lw=lastWeightsMap()[ex.name];
  var dots=Array.from({length:ex.sets},(_,j)=>'<div style="width:10px;height:10px;border-radius:50%;background:'+( j<WO.sets[ex.id]?'var(--green)':'var(--border)')+'"></div>').join('');
  var body=done
    ?'<div style="padding:0 16px 14px"><div style="background:rgba(63,185,80,0.08);border:1px solid rgba(63,185,80,0.2);border-radius:var(--rs);padding:10px 14px;display:flex;align-items:center;gap:8px"><span>🎯</span><span style="font-size:13px;color:var(--green);font-weight:600">Concluído!</span></div></div>'
    :'<div style="padding:0 16px 14px;display:flex;flex-direction:column;gap:12px">'
      +'<div style="display:flex;gap:12px">'
      +'<div style="flex:1"><span class="lbl">Carga (kg)</span>'
      +'<div class="ngrp"><button class="sbtn" onclick="woStep(\''+ex.id+'\',\'weight\',-2.5)">-</button>'
      +'<input type="number" value="'+d.weight+'" min="0" step="0.5" oninput="woSet(\''+ex.id+'\',\'weight\',+this.value)" id="inp-w-'+ex.id+'"/>'
      +'<button class="sbtn" onclick="woStep(\''+ex.id+'\',\'weight\',2.5)">+</button></div>'
      +(lw>0?'<p style="font-size:11px;color:var(--muted);margin-top:3px">Última: '+lw+'kg</p>':'')
      +'</div>'
      +'<div style="flex:1"><span class="lbl">Reps</span>'
      +'<div class="ngrp"><button class="sbtn" onclick="woStep(\''+ex.id+'\',\'reps\',-1)">-</button>'
      +'<input type="number" value="'+d.reps+'" min="1" oninput="woSet(\''+ex.id+'\',\'reps\',+this.value)" id="inp-r-'+ex.id+'"/>'
      +'<button class="sbtn" onclick="woStep(\''+ex.id+'\',\'reps\',1)">+</button></div></div>'
      +'</div>'
      +'<button class="btn btn-blue" onclick="woCompleteSet(\''+ex.id+'\')">✓ Concluir Série '+(WO.sets[ex.id]+1)+'/'+ex.sets+'</button>'
      +'</div>';

  return '<div id="exc-'+ex.id+'" style="background:var(--card);border:1px solid '+(done?'var(--green)':'var(--border)')+';border-radius:var(--rl);margin-bottom:12px;overflow:hidden">'
    +'<div style="padding:14px 16px;display:flex;align-items:center;gap:12px">'
    + exThumb(ex.name, done)
    +'<div style="flex:1">'
    +'<div style="font-weight:700;font-size:16px;color:'+(done?'var(--green)':'var(--txt)')+'">'+esc(ex.name)+'</div>'
    +'<div style="font-size:13px;color:var(--txt2)">'+WO.sets[ex.id]+'/'+ex.sets+' séries · '+ex.reps+' reps</div>'
    +'</div>'
    +'<div style="display:flex;gap:4px">'+dots+'</div>'
    +'</div>'
    + body
    +'</div>';
}

function woStep(exId,field,delta){
  if(!WO)return;
  var d=WO.data[exId]||{};
  var nv=Math.max(field==='reps'?1:0,(parseFloat(d[field])||0)+delta);
  (function(){var _d2=Object.assign({},d);_d2[field]=nv;WO.data[exId]=_d2;})();
  var inp=document.getElementById('inp-'+field[0]+'-'+exId);
  if(inp)inp.value=nv;
}
function woSet(exId,field,val){if(!WO)return;(function(){var _d=WO.data[exId]||{};_d[field]=val;WO.data[exId]=_d;})();}

function woCompleteSet(exId){
  if(!WO)return;
  if(!WO.started)woBegin();
  WO.sets[exId]=(WO.sets[exId]||0)+1;
  vib([50,30,100]);
  var ex=WO.workout.exercises.find(e=>e.id===exId);
  var card=document.getElementById('exc-'+exId);
  if(card&&ex){var t=document.createElement('div');t.innerHTML=renderExCard(ex);card.replaceWith(t.firstElementChild);}
  woUpdateProgress();woStartRest();woCheckDone();
  setTimeout(()=>(function(){var _ra=document.getElementById('wo-rest-area');if(_ra)_ra.scrollIntoView({behavior:'smooth',block:'center'});})(),150);
}

function woStartRest(){
  if(!WO)return;
  clearInterval(WO.restTimer);
  WO.restRemaining=60;WO.restTotal=60;
  woRenderRest();
  WO.restTimer=setInterval(()=>{
    if(!WO)return;
    WO.restRemaining--;
    if(WO.restRemaining<=0){
      clearInterval(WO.restTimer);
      vib([200,100,200,100,300]);
      var a=document.getElementById('wo-rest-area');if(a)a.innerHTML='';
      toast('⏰ Descansou! Hora de treinar!');
    } else woUpdateRing();
  },1000);
}

function woRenderRest(){
  var el=document.getElementById('wo-rest-area');if(!el||!WO)return;
  var circ=2*Math.PI*54;
  el.innerHTML='<div style="background:var(--card);border:1px solid var(--blue);border-radius:var(--rl);box-shadow:0 0 20px rgba(77,148,255,0.12);margin-bottom:12px">'
    +'<div style="padding:14px 16px;border-bottom:1px solid var(--border)"><p style="font-size:12px;font-weight:700;color:var(--blue2);text-transform:uppercase;letter-spacing:0.08em">⏸ Descanso</p></div>'
    +'<div style="padding:20px;display:flex;flex-direction:column;align-items:center;gap:14px">'
    +'<div style="position:relative;width:120px;height:120px">'
    +'<svg width="120" height="120" style="transform:rotate(-90deg)">'
    +'<circle cx="60" cy="60" r="54" fill="none" stroke="var(--border)" stroke-width="6"/>'
    +'<circle cx="60" cy="60" r="54" fill="none" stroke="var(--blue)" stroke-width="6" id="rest-ring" stroke-linecap="round" stroke-dasharray="'+circ+' '+circ+'"/>'
    +'</svg>'
    +'<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">'
    +'<span style="font-family:var(--fd);font-size:34px;line-height:1" id="rest-num">'+WO.restRemaining+'</span>'
    +'<span style="font-size:11px;color:var(--muted)">seg</span>'
    +'</div></div>'
    +'<div style="display:flex;gap:8px">'
    +'<button class="btn btn-ghost btn-sm" style="width:auto" onclick="woRestAdd(-15)">-15s</button>'
    +'<button class="btn btn-ghost btn-sm" style="width:auto" onclick="woRestAdd(15)">+15s</button>'
    +'<button class="btn btn-ghost btn-sm" style="width:auto" onclick="woRestAdd(30)">+30s</button>'
    +'</div>'
    +'<button class="btn btn-danger" onclick="woSkipRest()">Pular ▶</button>'
    +'</div></div>';
  woUpdateRing();
}

function woUpdateRing(){
  if(!WO)return;
  var num=document.getElementById('rest-num');
  var ring=document.getElementById('rest-ring');
  if(!num||!ring)return;
  num.textContent=WO.restRemaining;
  num.style.color=WO.restRemaining<=10?'var(--orange)':'var(--txt)';
  var circ=2*Math.PI*54;
  ring.setAttribute('stroke-dasharray',(circ*(WO.restRemaining/WO.restTotal))+' '+circ);
  ring.setAttribute('stroke',WO.restRemaining<=10?'var(--orange)':'var(--blue)');
}
function woRestAdd(d){if(!WO)return;WO.restRemaining=Math.max(0,WO.restRemaining+d);WO.restTotal=Math.max(WO.restTotal,WO.restRemaining);woUpdateRing();}
function woSkipRest(){if(!WO)return;clearInterval(WO.restTimer);var a=document.getElementById('wo-rest-area');if(a)a.innerHTML='';}

function woCheckDone(){
  if(!WO)return;
  var fa=document.getElementById('wo-finish-area');if(!fa)return;
  var all=WO.workout.exercises.every(ex=>WO.sets[ex.id]>=ex.sets);
  if(all)fa.innerHTML='<button class="btn btn-green pulse" onclick="woAskFinish()" style="font-size:18px;min-height:60px">🏆 Finalizar Treino</button>';
  else if(woDoneSets()>0)fa.innerHTML='<button class="btn btn-ghost" onclick="woAskFinish()" style="font-size:14px">Encerrar antecipado</button>';
  else fa.innerHTML='';
}

function woAskFinish(){
  openModal('<h2 style="font-family:var(--fd);font-size:26px;margin-bottom:16px">Como foi o treino?</h2>'
    +'<p style="color:var(--txt2);font-size:13px;margin-bottom:14px">Duração: '+fmtDur(WO?WO.elapsed:0)+' · '+woDoneSets()+'/'+woTotalSets()+' séries</p>'
    +'<p class="lbl" style="margin-bottom:10px">Como você se sentiu?</p>'
    +'<div style="display:flex;gap:8px;margin-bottom:20px">'
    +'<button class="feeling-btn" id="feel-easy"   onclick="selectFeeling(\'easy\')"  ><span class="feel-ico">😊</span>Fácil</button>'
    +'<button class="feeling-btn" id="feel-medium" onclick="selectFeeling(\'medium\')"><span class="feel-ico">😤</span>Moderado</button>'
    +'<button class="feeling-btn" id="feel-hard"   onclick="selectFeeling(\'hard\')"  ><span class="feel-ico">🥵</span>Difícil</button>'
    +'</div>'
    +'<div style="display:flex;flex-direction:column;gap:10px">'
    +'<button class="btn btn-green" onclick="closeModal();woFinish()">💾 Salvar e Finalizar</button>'
    +'<button class="btn btn-danger" onclick="closeModal();stopWorkout();showPage(\'home\')">🗑 Descartar</button>'
    +'<button class="btn btn-ghost" onclick="closeModal()">Continuar</button>'
    +'</div>');
}

function selectFeeling(f){
  if(WO)WO.feeling=f;
  document.querySelectorAll('.feeling-btn').forEach(b=>b.classList.remove('selected'));
  var el=document.getElementById('feel-'+f);if(el)el.classList.add('selected');
}

function woFinish(){
  if(!WO)return;
  var session={
    id:uid(),workoutId:WO.workout.id,workoutName:WO.workout.name,type:'gym',
    date:new Date().toISOString(),duration:Math.ceil(WO.elapsed/60),
    feeling:WO.feeling,
    exercises:WO.workout.exercises.map(ex=>({
      name:ex.name,sets:ex.sets,completedSets:WO.sets[ex.id]||0,
      weight:(WO.data[ex.id]&&WO.data[ex.id].weight)||0,reps:(WO.data[ex.id]&&WO.data[ex.id].reps)||ex.reps,
    })),
  };
  saveSession(session);
  stopWorkout();
  toast('🏆 Treino salvo!');
  setTimeout(()=>showPage('history'),600);
}

}

// -- STATS --------------------------------------------------------------
function renderStats(){
  var hist=getHistory(),wk=weekStats(),wh=getWeights(),now=new Date();
  var mo=hist.filter(s=>{var d=new Date(s.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
  var totalH=hist.reduce((a,s)=>a+(s.duration||0),0);
  var counts={};
  hist.forEach(s=>(s.exercises||[]).forEach(ex=>{counts[ex.name]=(counts[ex.name]||0)+(ex.completedSets||ex.sets);}));
  var top=Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  var maxC=(top[0]&&top[0][1])||1;
  var exs=Object.keys(wh);
  var year=now.getFullYear(),month=now.getMonth();
  var firstDay=new Date(year,month,1).getDay();
  var daysInMonth=new Date(year,month+1,0).getDate();
  var monthNames=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  var dayMap={};
  hist.forEach(s=>{var d=new Date(s.date);if(d.getMonth()===month&&d.getFullYear()===year){var key=d.getDate();if(!dayMap[key])dayMap[key]=new Set();dayMap[key].add(s.type||'gym');}});
  var dayHeaders=['D','S','T','Q','Q','S','S'].map(d=>'<div style="text-align:center;font-size:11px;color:var(--muted);font-weight:600;padding:4px 0">'+d+'</div>').join('');
  var calCells=Array(firstDay).fill('<div class="cal-day empty"></div>').join('');
  for(var d=1;d<=daysInMonth;d++){
    var types=dayMap[d];var isToday=d===now.getDate();

function renderWeightChart(){
  var sel=document.getElementById('sel-ex');if(!sel)return;
  var name=sel.value,wh=getWeights();
  var data=(wh[name]||[]).slice(-10);
  var el=document.getElementById('wt-chart');if(!el)return;
  if(!data.length){el.innerHTML='';return;}
  var maxW=Math.max(...data.map(d=>d.weight||0),1);
  var last=(data[data.length-1]&&data[data.length-1].weight)||0;
  var best=Math.max(...data.map(d=>d.weight||0));
  el.innerHTML='<div class="card"><div style="display:flex;gap:12px;margin-bottom:16px">'
    +'<div style="flex:1;text-align:center"><div style="font-family:var(--fd);font-size:24px;color:var(--blue2)">'+last+'kg</div><div style="font-size:11px;color:var(--muted)">Última</div></div>'

    +(data.length>1?'<div style="display:flex;align-items:flex-end;gap:4px;height:80px">'+data.map((d,i)=>'<div style="flex:1;height:100%;display:flex;align-items:flex-end"><div style="width:100%;height:'+(d.weight||0)/maxW*100+'%;background:'+(i===data.length-1?'linear-gradient(180deg,var(--blue),var(--bluedim))':'var(--border)')+';border-radius:3px 3px 0 0"></div></div>').join('')+'</div>':'')

function toggleMeal(meal){
  var body=document.getElementById('meal-'+meal);
  var arrow=document.getElementById('arrow-'+meal);
  if(!body)return;
  var open=body.classList.contains('open');
  body.classList.toggle('open');
  if(arrow)arrow.textContent=open?'▼':'▲';
}
function addFoodFromInput(meal){
  var inp=document.getElementById('food-input-'+meal);
  if(!inp||!inp.value.trim())return;
  addFoodItem(meal,inp.value.trim());
  inp.value='';renderFood();
  setTimeout(()=>toggleMeal(meal),50);
}
function addFoodItem(meal,item){
  var today=getFoodToday();
  today[meal]=(today[meal]||[]).concat([item]);
  saveFoodToday(today);renderFood();
}
function removeFoodItem(meal,idx){
  var today=getFoodToday();
  today[meal]=(today[meal]||[]).filter((_,i)=>i!==idx);
  saveFoodToday(today);renderFood();
}
function showAllSuggestions(meal){

    +'<div style="display:flex;flex-direction:column;gap:8px">'
    +suggs.map(s=>'<button onclick="addFoodItem(\''+meal+'\',\''+s.replace(/'/g,"\\'")+'\');closeModal()" style="background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;font-size:14px;color:var(--txt);cursor:pointer;text-align:left;font-family:var(--fb)">'+s+'</button>').join('')
    +'</div>');
}

function doExport(){
var data={workouts:getWorkouts(),history:getHistory(),weightHistory:getWeights(),at:new Date().toISOString()};
var a=document.createElement(‘a’);
a.href=‘data:application/json,’+encodeURIComponent(JSON.stringify(data,null,2));
a.download=‘gymtracker-’+new Date().toISOString().split(‘T’)[0]+’.json’;
a.click();toast(‘📤 Exportado!’);
}
function doImport(input){
var f=input.files[0];if(!f)return;
var r=new FileReader();
r.onload=e=>{try{var d=JSON.parse(e.target.result);if(d.workouts)saveWorkouts(d.workouts);if(d.history)lss(KEYS.H,d.history);if(d.weightHistory)lss(KEYS.WH,d.weightHistory);toast(‘✅ Importado!’);renderWorkouts();}catch{toast(‘❌ Erro ao importar’,false);}};
r.readAsText(f);
}

var PROFILE_KEY=‘gt_profile_v1’;
var WEIGHT_LOG_KEY=‘gt_weightlog_v1’;
function getProfile(){return ls(PROFILE_KEY)||{name:’’,photo:’’,weight:’’,height:’’,goal:‘hypertrophy’,birthdate:’’};}
function saveProfile(p){lss(PROFILE_KEY,p);}
function getWeightLog(){return ls(WEIGHT_LOG_KEY)||[];}
function addWeightLog(w){var log=getWeightLog();log.push({date:new Date().toISOString(),weight:w});lss(WEIGHT_LOG_KEY,log);}

function renderProfile(){
var p=getProfile(),log=getWeightLog(),age=’’;
if(p.birthdate){var bd=new Date(p.birthdate),now=new Date();age=Math.floor((now-bd)/(365.25*24*3600*1000));}
var imc=’’;
if(p.weight&&p.height){var h=parseFloat(p.height)/100;imc=(parseFloat(p.weight)/(h*h)).toFixed(1);}
var photoHtml=p.photo?’<img src="'+p.photo+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>’:’<span style="font-size:48px">👤</span>’;

var logHtml=’’;
if(log.length>1){
var maxW=Math.max(…log.map(l=>l.weight)),minW=Math.min(…log.map(l=>l.weight)),range=maxW-minW||1;
var last10=log.slice(-10);
logHtml=’<div style="display:flex;align-items:flex-end;gap:4px;height:80px;margin-top:10px">’+last10.map(function(l,i){
var pct=(l.weight-minW)/range*80+10,isLast=i===last10.length-1;
return’<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">’
+’<div style="width:100%;height:'+pct+'%;background:'+(isLast?'var(--blue)':'var(--border)')+';border-radius:3px 3px 0 0;min-height:4px"></div>’
+’<div style="font-size:9px;color:var(--muted)">’+l.weight+’</div></div>’;
}).join(’’)+’</div>’;
}

function imcColor(v){v=parseFloat(v);return v<18.5?’#1d4ed8’:v<25?’#15803d’:v<30?’#d97706’:’#dc2626’;}
function imcLabel(v){v=parseFloat(v);return v<18.5?‘Abaixo do peso’:v<25?‘Peso normal’:v<30?‘Sobrepeso’:‘Obesidade’;}
function imcEmoji(v){v=parseFloat(v);return v<18.5?‘⚠️’:v<25?‘✅’:v<30?‘⚡’:‘🔴’;}
function loadProfilePhoto(input){var f=input.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){saveProfileField(‘photo’,e.target.result);renderProfile();};r.readAsDataURL(f);}
function saveProfileField(field,val){var p=getProfile();p[field]=val;saveProfile(p);if(field===‘birthdate’||field===‘weight’||field===‘height’||field===‘photo’)renderProfile();}
function profileStep(field,delta){var p=getProfile();var v=parseFloat(p[field]||0)+delta;if(v<0)v=0;p[field]=v;saveProfile(p);var inp=document.getElementById(‘pf-’+field);if(inp)inp.value=v;if(field===‘weight’||field===‘height’)renderProfile();}
function logWeightNow(){var inp=document.getElementById(‘new-weight’);var v=parseFloat(inp&&inp.value);if(!v||v<=0)return;addWeightLog(v);saveProfileField(‘weight’,v);inp.value=’’;toast(‘⚖️ Peso registrado!’);renderProfile();}

];
var FONTS=[{id:‘Bebas Neue’,name:‘Bebas Neue’,sample:‘GYMTRACKER’},{id:‘Space Grotesk’,name:‘Space Grotesk’,sample:‘GymTracker’},{id:‘Georgia’,name:‘Georgia’,sample:‘GymTracker’},{id:‘Impact’,name:‘Impact’,sample:‘GYMTRACKER’}];
function getCurrentThemeId(){return localStorage.getItem(‘gt_theme’)||‘dark’;}
function applyTheme(themeId){
var t=THEMES.find(function(x){return x.id===themeId;});if(!t)return;
var root=document.documentElement;
root.style.setProperty(’–bg’,t.bg);root.style.setProperty(’–bg2’,t.bg2);root.style.setProperty(’–card’,t.card);root.style.setProperty(’–border’,t.border);
root.style.setProperty(’–blue’,t.blue);root.style.setProperty(’–blue2’,t.blue2);root.style.setProperty(’–bluedim’,t.bluedim);
root.style.setProperty(’–txt’,t.txt);root.style.setProperty(’–txt2’,t.txt2);root.style.setProperty(’–muted’,t.muted);
localStorage.setItem(‘gt_theme’,themeId);
}
function applyFont(fontId){document.documentElement.style.setProperty(’–fd’,”’”+fontId+”’, sans-serif”);localStorage.setItem(‘gt_font’,fontId);}
function applyCustomColor(variable,value){document.documentElement.style.setProperty(variable,value);var custom=JSON.parse(localStorage.getItem(‘gt_custom_colors’)||’{}’);custom[variable]=value;localStorage.setItem(‘gt_custom_colors’,JSON.stringify(custom));}
function loadSavedTheme(){
var tid=localStorage.getItem(‘gt_theme’);if(tid)applyTheme(tid);
var fid=localStorage.getItem(‘gt_font’);if(fid)applyFont(fid);
try{var custom=JSON.parse(localStorage.getItem(‘gt_custom_colors’)||’{}’);Object.entries(custom).forEach(function(e){document.documentElement.style.setProperty(e[0],e[1]);});}catch(e){}
}
function openThemePicker(){
var currentId=getCurrentThemeId(),currentFont=localStorage.getItem(‘gt_font’)||‘Bebas Neue’;
var themeGrid=THEMES.map(function(t){
var active=currentId===t.id;
return’<button onclick="applyTheme(\''+t.id+'\');openThemePicker()" style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 6px;border-radius:var(--r);border:2px solid '+(active?t.blue:'var(--border)')+';background:'+t.bg2+';cursor:pointer;font-family:var(--fb)">’
+’<div style="display:flex;gap:3px"><div style="width:14px;height:14px;border-radius:50%;background:'+t.bg+'"></div><div style="width:14px;height:14px;border-radius:50%;background:'+t.blue+'"></div><div style="width:14px;height:14px;border-radius:50%;background:'+t.txt+'"></div></div>’
+’<span style="font-size:16px">’+t.emoji+’</span><span style="font-size:11px;font-weight:600;color:'+t.txt2+'">’+t.name+’</span>’
+(active?’<div style="width:16px;height:16px;border-radius:50%;background:'+t.blue+';display:flex;align-items:center;justify-content:center;font-size:10px">✓</div>’:’’)
+’</button>’;
}).join(’’);
var fontBtns=FONTS.map(function(f){
var active=currentFont===f.id;
return’<button onclick="applyFont(\''+f.id+'\');openThemePicker()" style="flex:1;padding:10px 6px;border-radius:var(--r);border:2px solid '+(active?'var(--blue)':'var(--border)')+';background:'+(active?'var(--bluedim)':'var(--card)')+';cursor:pointer;font-family:var(--fb);font-size:11px;font-weight:600;color:'+(active?'var(--blue2)':'var(--txt2)')+';">’
+’<div style="font-family:\''+f.id+'\',sans-serif;font-size:16px;margin-bottom:2px;color:var(--txt)">’+f.sample+’</div>’+f.name+’</button>’;
}).join(’’);
var curAccent=getComputedStyle(document.documentElement).getPropertyValue(’–blue’).trim()||’#4d94ff’;
var curBg=getComputedStyle(document.documentElement).getPropertyValue(’–bg’).trim()||’#0d1117’;
var curCard=getComputedStyle(document.documentElement).getPropertyValue(’–card’).trim()||’#1c2128’;
openModal(’<h2 style="font-family:var(--fd);font-size:26px;margin-bottom:4px">🎨 Personalizar Tema</h2>’
+’<p style="font-size:13px;color:var(--txt2);margin-bottom:16px">Escolha um tema ou crie o seu</p>’
+’<p class="lbl" style="margin-bottom:10px">Temas Prontos</p>’
+’<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:20px">’+themeGrid+’</div>’
+’<p class="lbl" style="margin-bottom:10px">Fonte do Título</p>’
+’<div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">’+fontBtns+’</div>’
+’<p class="lbl" style="margin-bottom:10px">Cores Personalizadas</p>’
+’<div style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px">’
+’<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg);border-radius:var(--rs);border:1px solid var(--border)"><div><div style="font-weight:600;font-size:14px">Cor de Destaque</div></div><input type="color" value="'+curAccent.replace(/ /g,'')+'" onchange="applyCustomColor(\'--blue\',this.value);applyCustomColor(\'--blue2\',this.value)" style="width:44px;height:36px;border:none;border-radius:8px;cursor:pointer;background:none;padding:2px"/></div>’
+’<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg);border-radius:var(--rs);border:1px solid var(--border)"><div><div style="font-weight:600;font-size:14px">Fundo Principal</div></div><input type="color" value="'+curBg.replace(/ /g,'')+'" onchange="applyCustomColor(\'--bg\',this.value)" style="width:44px;height:36px;border:none;border-radius:8px;cursor:pointer;background:none;padding:2px"/></div>’
+’<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg);border-radius:var(--rs);border:1px solid var(--border)"><div><div style="font-weight:600;font-size:14px">Cor dos Cards</div></div><input type="color" value="'+curCard.replace(/ /g,'')+'" onchange="applyCustomColor(\'--card\',this.value)" style="width:44px;height:36px;border:none;border-radius:8px;cursor:pointer;background:none;padding:2px"/></div>’
+’</div>’
+’<button onclick="resetTheme();closeModal()" class="btn btn-ghost" style="font-size:13px">↩ Restaurar padrão</button>’);
}
function resetTheme(){
localStorage.removeItem(‘gt_theme’);localStorage.removeItem(‘gt_font’);localStorage.removeItem(‘gt_custom_colors’);
[’–bg’,’–bg2’,’–card’,’–border’,’–blue’,’–blue2’,’–bluedim’,’–txt’,’–txt2’,’–muted’,’–fd’].forEach(function(v){document.documentElement.style.removeProperty(v);});
toast(‘↩ Tema restaurado!’);
}

// – BOOT —————————————————————
loadSavedTheme();
initData();
renderHome();

fetch(‘exercise imgs.json’)
.then(r => r.json())
.then(data => {
Object.assign(EXERCISE_IMGS, data);
EXSUGG = Object.keys(EXERCISE_IMGS).sort();
})
.catch(e => console.log(‘imgs:’, e));
</script>
